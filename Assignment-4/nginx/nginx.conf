worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker internal DNS resolver — enables dynamic resolution for scaled services
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;

        location / {
            # Using a variable forces nginx to re-resolve DNS on each request.
            # Docker DNS returns all container IPs for a scaled service,
            # enabling round-robin load balancing across web-app instances.
            set $backend http://web-app:8080;

            proxy_pass         $backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
