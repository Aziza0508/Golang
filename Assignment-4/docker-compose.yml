services:
  db:
    image: postgres:15-alpine
    container_name: movies-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-moviesdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/000001_create_movies.up.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-moviesdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - movie-net

  migrate:
    image: migrate/migrate:v4.16.2
    container_name: movies-migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-moviesdb}?sslmode=disable",
        "up"
      ]
    networks:
      - movie-net

  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-moviesdb}
      DB_SSLMODE: disable
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - movie-net

  nginx:
    image: nginx:alpine
    container_name: movies-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-app
    networks:
      - movie-net

volumes:
  pgdata:

networks:
  movie-net:
    driver: bridge
